<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>

  <meta name="description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}">

  <link rel="canonical" href="{{ site.url }}{{ page.url | remove: '/index.html' | remove: '.html' }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url | remove: '/index.html' | remove: '.html' }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ site.url }}/assets/nexfde-og.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #111111;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "provider": {
      "@type": "Organization",
      "name": "NEXFDE",
      "url": "{{ site.url }}"
    },
    "name": "NEXFDE — Enterprise AI Deployment",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "serviceType": "Enterprise AI Deployment",
    "areaServed": { "@type": "Country", "name": "China" },
    "availableChannel": {
      "@type": "ServiceChannel",
      "serviceUrl": "{{ site.url }}"
    }
  }
  </script>

  {% if page.faq_schema %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "你们和普通 AI 咨询有什么不同？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "NEXFDE 不以"交一份建议书"作为结束，而是以"跑通第一条真实流程"为目标。我们更接近 deployment practice，而不是泛方案咨询。"
        }
      },
      {
        "@type": "Question",
        "name": "你们是做咨询，还是做实施？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "两者之间的断层正是 NEXFDE 解决的问题。我们不是只给建议，也不是一上来就做大实施，而是从判断、验证到接入，逐步推进。"
        }
      },
      {
        "@type": "Question",
        "name": "如果我们现在还不确定值不值得做，怎么办？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "这正是 AI Deployment Diagnostic 的意义。它不是为了证明 AI 一定要做，而是帮助你判断：哪些值得做、哪些先别碰。"
        }
      },
      {
        "@type": "Question",
        "name": "你们适合什么规模的公司？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "最适合已经有一定业务复杂度、真实流程需求和明确行动意愿的团队。不一定要非常大，但需要是真正准备行动的组织。"
        }
      },
      {
        "@type": "Question",
        "name": "你们会不会只推荐某种固定工具？",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "不会。NEXFDE 的起点是业务流程，不是工具清单。工具是手段，不是页面主角。"
        }
      }
    ]
  }
  </script>
  {% endif %}
</head>
